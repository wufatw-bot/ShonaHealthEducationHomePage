<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>追風少年的內心目錄</title>
<style>
body {
    font-family: "Noto Sans TC", sans-serif;
    margin: 0;
    background: #f7f9fb;
    color: #333;
}
.hero {
    background: linear-gradient(135deg, #4A90E2, #6FC3DF);
    color: white;
    text-align: center;
    padding: 60px 20px;
}
.hero h1 {
    font-size: 36px;
    margin-bottom: 10px;
}
.hero p {
    font-size: 18px;
}
.cta {
    margin-top: 20px;
}
.cta a {
    background: white;
    color: #4A90E2;
    padding: 10px 20px;
    margin: 5px;
    text-decoration: none;
    border-radius: 25px;
    font-weight: bold;
}
.section {
    padding: 40px 20px;
    max-width: 1100px;
    margin: auto;
}
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
}
.card {
    background: white;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.08);
    transition: 0.3s;
}
.card:hover {
    transform: translateY(-5px);
}
.card h3 {
    margin: 10px 0;
}
.footer {
    text-align: center;
    padding: 30px;
    font-size: 14px;
    color: #888;
}
</style>
</head>

<body>

<!-- Hero -->
<div class="hero">
    <h1>追風少年的內心目錄</h1>
    <p>你看到的是叛逆，他其實在求救</p>
    <p>從醫療與心理觀點，理解青少年的10種內心狀態</p>

    <div class="cta">
        <a href="#">了解孩子</a>
        <a href="#">預約評估</a>
    </div>
</div>

<!-- 動物分類 -->
<div class="section">
    <h2 style="text-align:center;">10種青少年內心故事</h2>

    <div class="grid">

        <div class="card"><h3>🐺 孤狼</h3><p>疏離與獨立</p></div>
        <div class="card"><h3>🐯 爆火虎</h3><p>情緒失控</p></div>
        <div class="card"><h3>🦊 變色狐</h3><p>身份探索</p></div>
        <div class="card"><h3>🐒 跟風猴</h3><p>同儕影響</p></div>
        <div class="card"><h3>🐢 拖延龜</h3><p>壓力逃避</p></div>
        <div class="card"><h3>🦅 逆風鷹</h3><p>對抗權威</p></div>
        <div class="card"><h3>🐍 冷感蛇</h3><p>情緒低落</p></div>
        <div class="card"><h3>🐗 衝撞豬</h3><p>衝動行為</p></div>
        <div class="card"><h3>🦋 轉變蝶</h3><p>自我重塑</p></div>
        <div class="card"><h3>🐉 失控龍</h3><p>高風險警訊</p></div>

    </div>
</div>

<!-- 醫療提醒 -->
<div class="section">
    <h2>醫療專業提醒</h2>
    <p>
    青少年的叛逆多屬正常發展，但若影響學業、人際關係，
    或出現情緒低落、暴力、自傷等行為，建議及早進行專業評估。
    </p>

    <div class="cta" style="text-align:center;">
        <a href="#">預約門診</a>
        <a href="#">線上諮詢</a>
    </div>
</div>

<div class="footer">
    © 家庭醫學與青少年心理健康
</div>

</body>
</html>
